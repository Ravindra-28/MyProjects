<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusSync ERP</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, rgba(91, 97, 255, 0.18), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 30%),
                  #08101c;
      color: #eef2ff;
    }

    .hero {
      max-width: 760px;
      padding: 40px;
      text-align: center;
      border-radius: 32px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: -0.05em;
    }

    p {
      margin: 0 0 28px;
      line-height: 1.8;
      color: #a5b4fc;
      font-size: 1.05rem;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 18px 32px;
      border-radius: 999px;
      background: linear-gradient(135deg, #6366f1, #22c55e);
      color: white;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease;
    }

    a.button:hover {
      transform: translateY(-2px);
    }

    .meta {
      margin-top: 24px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>CampusSync ERP is online</h1>
    <p>Welcome to the CampusSync college ERP demo. This website is now deployed and ready to show the AI-powered login and dashboard experience.</p>
    <a class="button" href="campussync-erp.html">Open CampusSync ERP</a>
    <div class="meta">Deployed from the MyProjects repository using GitHub Pages.</div>
  </div>
</body>
</html>
